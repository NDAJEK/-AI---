<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>青途 AI — 衔接期认知重构助手</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* ===== 温暖配色方案 ===== */
    --cream-50:  #FEF8F2;
    --cream-100: #FDF0E3;
    --cream-200: #FBE3CA;
    --cream-300: #F8D1A8;
    --warm-300:  #E8A85E;
    --warm-400:  #D4782A;
    --warm-500:  #C06A20;
    --warm-600:  #A85A18;
    --warm-700:  #8A4A12;
    --brown-100: #E8DDD0;
    --brown-200: #C4B09A;
    --brown-300: #8B7355;
    --brown-600: #3D2B1A;
    --brown-800: #2C1810;
    --green-50:  #F2F7ED;
    --green-400: #7A9E5A;
    --green-500: #5E8240;
    --amber-50:  #FDF6ED;
    --amber-400: #C8913C;
    --radius:   14px;
    --radius-sm:10px;
    --radius-xs:8px;
    --font:     'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--cream-50);
    color: var(--brown-800);
    line-height: 1.65;
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100%;
    max-width: 860px;
    margin: 0 auto;
    background: #fffcf9;
    box-shadow: 0 8px 32px rgba(60,40,20,0.10);
    overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 80px;
    background: var(--brown-600);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0 14px;
    gap: 1px;
    flex-shrink: 0;
    z-index: 10;
  }
  .sidebar .mini-logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--warm-400);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .sidebar .mini-logo svg { width: 22px; height: 22px; }

  .sidebar-btn {
    width: 100%;
    padding: 10px 0;
    border: none;
    background: transparent;
    color: rgba(255,235,215,0.40);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: all 0.2s;
  }
  .sidebar-btn:hover {
    background: rgba(255,235,215,0.08);
    color: rgba(255,235,215,0.85);
  }
  .sidebar-btn .s-icon { font-size: 20px; line-height: 1; }
  .sidebar-btn .s-label {
    font-size: 10px; line-height: 1.2;
    letter-spacing: 0.3px;
    opacity: 0.55; transition: opacity 0.2s;
  }
  .sidebar-btn:hover .s-label { opacity: 1; }
  .sidebar-btn.active-tab {
    background: rgba(255,235,215,0.10);
    color: #fff;
  }
  .sidebar-btn.active-tab .s-label { opacity: 1; }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, #D4782A 0%, #A85A18 100%);
    color: #fff;
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .header .logo-wrap {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .header .logo-wrap svg { width: 30px; height: 30px; }
  .header h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.4px; }
  .header .sub { font-size: 12px; opacity: 0.82; margin-top: 1px; }

  /* ===== Steps ===== */
  .steps-bar {
    display: flex;
    gap: 3px;
    padding: 12px 20px 10px;
    background: var(--cream-50);
    border-bottom: 1px solid var(--cream-100);
    flex-shrink: 0;
    overflow-x: auto;
    user-select: none;
  }
  .step-dot {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--brown-200);
    transition: color 0.35s;
    cursor: default;
    position: relative;
  }
  .step-dot .circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--cream-100);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--brown-200);
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .step-dot.active .circle {
    background: var(--warm-400);
    color: #fff;
    box-shadow: 0 2px 10px rgba(212,120,42,0.35);
    transform: scale(1.08);
  }
  .step-dot.active { color: var(--warm-500); font-weight: 600; }
  .step-dot.done .circle { background: var(--green-400); color: #fff; font-size: 14px; }
  .step-dot.done { color: var(--green-500); }
  .step-dot .label {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 64px; text-align: center; font-size: 10.5px;
  }
  .step-dot .connector {
    position: absolute; top: 14px; left: -50%; width: 100%; height: 2px;
    background: var(--cream-100); z-index: -1;
  }
  .step-dot:first-child .connector { display: none; }
  .step-dot.done .connector, .step-dot.active .connector { background: var(--cream-300); }

  /* ===== Chat ===== */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 22px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    background: #fffcf9;
  }
  .chat::-webkit-scrollbar { width: 5px; }
  .chat::-webkit-scrollbar-thumb { background: var(--cream-200); border-radius: 8px; }
  .chat::-webkit-scrollbar-track { background: transparent; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.35s ease;
  }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg .avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-top: 4px;
  }
  .msg.bot .avatar { background: var(--cream-100); }
  .msg.user .avatar { background: var(--cream-200); }

  .msg .bubble {
    padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 14.5px; line-height: 1.7; word-break: break-word;
  }
  .msg.bot .bubble {
    background: var(--cream-50); border: 1px solid var(--cream-100);
    border-top-left-radius: 3px; color: var(--brown-800);
  }
  .msg.user .bubble { background: var(--warm-400); color: #fff; border-top-right-radius: 3px; }

  .msg .time { font-size: 11px; color: var(--brown-200); margin-top: 3px; padding: 0 4px; }
  .msg.bot .time { text-align: left; }
  .msg.user .time { text-align: right; }

  /* ===== Belief card ===== */
  .belief-card {
    background: var(--amber-50);
    border: 1.5px solid var(--amber-400);
    border-radius: var(--radius-xs);
    padding: 14px 16px;
    margin: 6px 0 4px;
    font-size: 14px; line-height: 1.7;
    box-shadow: 0 2px 8px rgba(200,145,60,0.10);
  }
  .belief-card .tag {
    display: inline-block;
    background: var(--amber-400); color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 2px 10px; border-radius: 4px; margin-bottom: 8px;
  }

  /* ===== Action card ===== */
  .action-card {
    background: var(--green-50);
    border: 1.5px solid var(--green-400);
    border-radius: var(--radius-xs);
    padding: 14px 16px; margin: 8px 0 4px;
  }
  .action-card .title {
    font-weight: 700; color: var(--green-500);
    font-size: 14px; margin-bottom: 8px;
  }
  .action-card .item {
    padding: 5px 0; font-size: 13.5px; color: var(--brown-800);
    border-bottom: 1px dashed rgba(94,130,64,0.12);
    display: flex; align-items: flex-start; gap: 6px;
  }
  .action-card .item:last-child { border-bottom: none; }
  .action-card .item .check { color: var(--green-400); flex-shrink: 0; margin-top: 2px; }

  /* ===== Tool Panel ===== */
  .tool-panel-overlay {
    position: fixed; inset: 0; background: rgba(60,40,20,0.30);
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .tool-panel-overlay.show { opacity: 1; pointer-events: auto; }

  .tool-panel {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.92);
    width: 400px; max-width: 90vw;
    background: #fffcf9;
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(60,40,20,0.18);
    z-index: 101;
    padding: 28px 26px 22px;
    opacity: 0; pointer-events: none;
    transition: all 0.30s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 85vh; overflow-y: auto;
  }
  .tool-panel.show { opacity: 1; pointer-events: auto; transform: translate(-50%,-50%) scale(1); }

  .tool-panel .tp-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .tool-panel .tp-header .tp-icon-wrap {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .tool-panel .tp-header h2 { font-size: 18px; color: var(--brown-800); font-weight: 700; }
  .tool-panel .tp-body p.desc {
    font-size: 13.5px; color: var(--brown-300);
    line-height: 1.75; margin-bottom: 16px;
  }
  .tool-panel .tp-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .tool-panel .tp-item {
    background: var(--cream-50);
    border-radius: var(--radius-xs);
    padding: 14px 14px 12px;
    border-left: 3px solid var(--cream-300);
    line-height: 1.6;
  }
  .tool-panel .tp-item .item-title {
    font-weight: 700; color: var(--warm-500);
    font-size: 14px; margin-bottom: 4px;
  }
  .tool-panel .tp-item .item-desc {
    font-size: 13px; color: var(--brown-300); line-height: 1.65;
  }
  .tool-panel .tp-item .item-scene {
    font-size: 12px; color: var(--cream-300); margin-top: 4px;
  }
  .tool-panel .tp-footer {
    font-size: 12.5px; color: var(--brown-200);
    border-top: 1px solid var(--cream-100);
    padding: 12px 0 0; line-height: 1.6;
  }
  .tool-panel .tp-theory {
    font-size: 11px; color: var(--brown-200);
    margin-top: 6px; text-align: right;
    letter-spacing: 0.3px;
  }
  .tool-panel .close-tool {
    width: 100%;
    padding: 10px; border: none; border-radius: var(--radius-xs);
    background: var(--cream-50); color: var(--brown-300);
    font-size: 14px; cursor: pointer; transition: background 0.2s; margin-top: 14px;
  }
  .tool-panel .close-tool:hover { background: var(--cream-100); }

  /* ===== Badge previews ===== */
  .badge-row {
    display: flex; gap: 12px; justify-content: center;
    margin: 10px 0 14px;
  }
  .badge-row .badge {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-direction: column; gap: 2px;
    transition: transform 0.2s;
  }
  .badge-row .badge:hover { transform: scale(1.08); }
  .badge-row .badge.unlocked { background: var(--cream-100); border: 2px solid var(--cream-300); }
  .badge-row .badge.locked { background: var(--cream-50); border: 2px dashed var(--cream-200); filter: grayscale(0.6); }
  .badge-row .badge .b-label { font-size: 8px; color: var(--brown-200); white-space: nowrap; }

  /* ===== Bottom ===== */
  .bottom-bar { flex-shrink: 0; padding: 0 22px; }
  .disclaimer {
    padding: 8px 14px; background: var(--cream-100);
    border-radius: var(--radius-xs); font-size: 12px;
    color: var(--brown-300); line-height: 1.5; margin-bottom: 2px;
  }
  .disclaimer strong { font-weight: 600; color: var(--warm-500); }
  .design-credit {
    text-align: center; font-size: 10px;
    color: var(--brown-200); padding: 3px 0 4px;
    letter-spacing: 0.4px; cursor: default;
  }

  /* ===== Input ===== */
  .input-area {
    padding: 6px 22px 14px;
    border-top: 1px solid var(--cream-100);
    background: #fffcf9;
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    border: 1.5px solid var(--cream-200);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font);
    resize: none; outline: none;
    min-height: 44px; max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, background 0.2s;
    background: var(--cream-50);
    color: var(--brown-800);
  }
  .input-area textarea:focus { border-color: var(--cream-300); background: #fffcf9; }
  .input-area textarea::placeholder { color: var(--brown-200); }

  .input-area .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--warm-400);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .input-area .send-btn:hover { background: var(--warm-500); transform: scale(1.04); }
  .input-area .send-btn:active { transform: scale(0.95); }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .sidebar { width: 62px; padding: 14px 0; }
    .sidebar .mini-logo { width: 30px; height: 30px; margin-bottom: 12px; }
    .sidebar .mini-logo svg { width: 18px; height: 18px; }
    .sidebar-btn { padding: 8px 0; }
    .sidebar-btn .s-icon { font-size: 17px; }
    .sidebar-btn .s-label { font-size: 9px; }
    .app { max-width: 100%; }
    .header { padding: 14px 16px 12px; }
    .header h1 { font-size: 17px; }
    .header .logo-wrap { width: 40px; height: 40px; }
    .header .logo-wrap svg { width: 24px; height: 24px; }
    .chat { padding: 14px 14px 8px; gap: 12px; }
    .input-area { padding: 6px 14px 12px; }
    .bottom-bar { padding: 0 14px; }
    .msg { max-width: 92%; }
    .steps-bar { padding: 8px 12px; gap: 2px; }
    .step-dot .circle { width: 24px; height: 24px; font-size: 11px; }
    .step-dot .label { max-width: 36px; font-size: 9px; }
    .tool-panel { width: 92vw; padding: 20px 16px 18px; }
    .badge-row .badge { width: 44px; height: 44px; font-size: 18px; }
  }
</style>
</head>
<body>

<div class="tool-panel-overlay" id="toolOverlay"></div>
<div class="tool-panel" id="toolPanel"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="mini-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 50 L22 26 L34 50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M26 50 L38 20 L50 50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="46" cy="22" r="9" fill="rgba(255,255,255,0.20)" stroke="white" stroke-width="2.2"/>
        <circle cx="46" cy="23" r="4.5" fill="rgba(255,255,255,0.50)"/>
        <path d="M16 50 Q24 44 30 38 Q36 32 34 26" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.50"/>
        <path d="M4 54 Q32 46 60 54" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.30"/>
      </svg>
    </div>
    <button class="sidebar-btn active-tab" data-tool="chat" onclick="switchTool('chat')">
      <span class="s-icon">💬</span>
      <span class="s-label">咨询对话</span>
    </button>
    <button class="sidebar-btn" data-tool="assess" onclick="switchTool('assess')">
      <span class="s-icon">📊</span>
      <span class="s-label">适应力测评</span>
    </button>
    <button class="sidebar-btn" data-tool="toolbox" onclick="switchTool('toolbox')">
      <span class="s-icon">🧰</span>
      <span class="s-label">心理工具箱</span>
    </button>
    <button class="sidebar-btn" data-tool="archive" onclick="switchTool('archive')">
      <span class="s-icon">📁</span>
      <span class="s-label">成长档案</span>
    </button>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="logo-wrap">
        <svg viewBox="0 0 64 64" fill="none">
          <path d="M10 50 L22 26 L34 50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M26 50 L38 20 L50 50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="46" cy="22" r="9" fill="rgba(255,255,255,0.20)" stroke="white" stroke-width="2.2"/>
          <circle cx="46" cy="23" r="4.5" fill="rgba(255,255,255,0.50)"/>
          <path d="M16 50 Q24 44 30 38 Q36 32 34 26" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.50"/>
          <path d="M4 54 Q32 46 60 54" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.30"/>
        </svg>
      </div>
      <div>
        <h1>青途 AI</h1>
        <div class="sub">衔接期认知重构助手 · CBT</div>
      </div>
    </header>

    <!-- Steps -->
    <div class="steps-bar" id="stepsBar">
      <div class="step-dot active" data-step="1"><div class="connector"></div><div class="circle">1</div><span class="label">事件梳理</span></div>
      <div class="step-dot" data-step="2"><div class="connector"></div><div class="circle">2</div><span class="label">情绪标注</span></div>
      <div class="step-dot" data-step="3"><div class="connector"></div><div class="circle">3</div><span class="label">信念识别</span></div>
      <div class="step-dot" data-step="4"><div class="connector"></div><div class="circle">4</div><span class="label">反思引导</span></div>
      <div class="step-dot" data-step="5"><div class="connector"></div><div class="circle">5</div><span class="label">重构方案</span></div>
    </div>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <div class="disclaimer">
        <strong>📋 心理科普自助工具</strong> · 不提供医疗诊断 · 不能替代专业心理咨询<br>
        如出现自伤、自杀、重度抑郁等严重情绪危机，请立即拨打 <strong>12355</strong> 青少年服务热线
      </div>
      <div class="design-credit">本工具干预流程基于认知行为疗法（CBT）人工设计，AI 仅作为交互执行载体</div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="msgInput" rows="1" placeholder="请客观描述最近让你情绪波动的一件事…" enterkeyhint="send"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const chat = document.getElementById('chat');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const stepDots = document.querySelectorAll('.step-dot');
  const sideBtns = document.querySelectorAll('.sidebar-btn');
  const overlay = document.getElementById('toolOverlay');
  const panel = document.getElementById('toolPanel');

  let step = 1, subIdx = 0, history = [], userFirstEvent = '';

  const TOOLS = {
    assess: { icon:'📊', bg:'var(--cream-100)', title:'适应力测评', theory:'设计依据：Savickas 生涯适应力理论（Career Adaptability）', desc:'从四个核心维度评估你进入大学前的适应准备程度，帮助你有针对性地做好心理和行动上的过渡准备。', items:[
      { t:'🔍 生涯关注', d:'你是否主动了解过大学的专业课程和未来就业方向？', scene:'⏳ 主动收集信息，减少未知焦虑' },
      { t:'🎯 生涯控制', d:'你相信自己能通过规划和努力，影响未来发展的方向吗？', scene:'⏳ 建立主动决策意识，避免被动等待' },
      { t:'🧗 生涯好奇', d:'你愿意尝试新的学习领域、社团活动和社交圈吗？', scene:'⏳ 保持开放心态，加速适应新环境' },
      { t:'💪 生涯自信', d:'面对新环境中的不确定性和挑战，你相信自己能应对吗？', scene:'⏳ 提升自我效能感，降低入学前焦虑' }
    ], footer:'完整量表将在下一版本上线，届时可查看各维度得分与个性化建议。' },
    toolbox: { icon:'🧰', bg:'var(--cream-100)', title:'心理工具箱', theory:'设计依据：认知行为疗法（CBT）自助技术 · 正念减压（MBSR）', desc:'一组即拿即用的自助练习工具，覆盖瞬时情绪平复、日常觉察训练、思维模式矫正三个层次。', items:[
      { t:'🧘 478 呼吸法', d:'吸气 4 秒 → 屏息 7 秒 → 呼气 8 秒，完成 3 组。', scene:'🎯 适用于入学焦虑、紧张情绪快速平复' },
      { t:'📝 情绪记录日记', d:'每天花 3 分钟记录：发生了什么事 → 感受到什么情绪 → 当时的想法是什么。', scene:'🎯 逐步提升情绪觉察和认知识别能力' },
      { t:'🔄 认知重构练习', d:'当出现"我一定不行"这类想法时，问自己：支持证据？反对证据？其他可能性？', scene:'🎯 矫正自动化负性思维，建立更平衡的认知' },
      { t:'🌿 五分钟正念', d:'静坐专注呼吸 5 分钟。思绪跑偏时温和拉回，不评判自己。', scene:'🎯 降低日常焦虑水平，提升专注力和情绪调节力' }
    ], footer:'选择一项，每天坚持 5–10 分钟，效果会逐渐积累。无需一次性全部尝试。' },
    archive: { icon:'📁', bg:'var(--cream-100)', title:'成长档案', theory:'设计依据：操作性条件反射 · 情绪觉察训练 · 成长型思维', desc:'每一次对话都是一次成长的记录。回顾自己的认知变化轨迹，看到自己如何一步步变得更清晰、更有力量。', items:[
      { t:'📅 对话记录', d:'按时间顺序查看每次认知重构训练的完整对话，回顾思考方式的变化。', scene:'' },
      { t:'📈 情绪趋势', d:'追踪每次对话中标注的情绪类型和强度变化，直观看到情绪管理的进步。', scene:'' },
      { t:'🏆 完成徽章', d:'每完成一轮完整的 5 步流程，即可解锁一枚成就徽章。', scene:'' },
      { t:'📖 反思笔记', d:'每次训练后写下收获和感悟，沉淀为专属的成长日记。', scene:'' }
    ], footer:'📌 目前暂无对话记录。完成一次完整的 5 步流程后，记录将自动保存于此。', badges: true }
  };

  window.switchTool = function(key) {
    sideBtns.forEach(b => b.classList.toggle('active-tab', b.dataset.tool === key));
    if (key === 'chat') { closeToolPanel(); return; }
    openToolPanel(key);
  };
  function openToolPanel(key) {
    const t = TOOLS[key]; if (!t) return;
    let html = `<div class="tp-header"><div class="tp-icon-wrap" style="background:${t.bg}">${t.icon}</div><h2>${t.title}</h2></div><div class="tp-body"><p class="desc">${t.desc}</p><div class="tp-items">`;
    t.items.forEach(item => {
      html += `<div class="tp-item"><div class="item-title">${item.t}</div><div class="item-desc">${item.d}</div>`;
      if (item.scene) html += `<div class="item-scene">${item.scene}</div>`;
      html += `</div>`;
    });
    if (t.badges) {
      html += `<div class="badge-row"><div class="badge locked" title="尚未解锁">🔒<span class="b-label">—</span></div><div class="badge unlocked" title="初次完成">🌱<span class="b-label">初启</span></div><div class="badge locked" title="尚未解锁">🔒<span class="b-label">—</span></div><div class="badge unlocked" title="三次完成">🔥<span class="b-label">坚持</span></div><div class="badge locked" title="尚未解锁">🔒<span class="b-label">—</span></div></div>`;
    }
    html += `</div><div class="tp-footer">${t.footer}</div><div class="tp-theory">${t.theory}</div></div><button class="close-tool" onclick="closeToolPanel()">关闭</button>`;
    panel.innerHTML = html;
    overlay.classList.add('show'); panel.classList.add('show');
  }
  window.closeToolPanel = function() { overlay.classList.remove('show'); panel.classList.remove('show'); sideBtns.forEach(b => b.classList.toggle('active-tab', b.dataset.tool === 'chat')); };
  overlay.addEventListener('click', closeToolPanel);

  const PH = { 1:'请客观描述最近让你情绪波动的一件事…', 2:'请选择情绪并打出 1-10 分（如"失落，8分"）…', 3:'理解后请回复"可以"进入下一步…', 4:'想好了随时告诉我你的想法…', 5:'选一个微行动试试吧，做完可以回来分享感受 😊' };

  const W = {
    s1: `你好，我是 **青途 AI — 衔接期认知重构助手**。\n\n高中到大学这段过渡期，心里有些起伏是很正常的。我会用一套标准化的 CBT 方法，陪你一步步梳理和调整。\n\n我们先进行 **第一步：事件梳理**。\n\n请你回想一下，最近有没有哪件具体的事情，让你感到明显的情绪波动（烦躁、低落、不安等）？请尽量客观地描述这件事发生了什么，不用加入"我觉得""我认为"这类主观判断，就像在讲一件客观发生的事一样。`,
    s2: `好的，我们已经清楚事件本身了。\n\n现在进入 **第二步：情绪标注**。\n\n请从以下 5 种情绪中，选出你此刻最明显感受到的一种，并给你的情绪强度打 1-10 分（1 分最弱，10 分最强）：\n\n- **焦虑**\n- **迷茫**\n- **失落**\n- **自卑**\n- **担忧**\n\n比如："失落，8分。"——请直接告诉我你的选择和分数。`,
    s3_intro: `好的，情绪强度我们记下了。\n\n现在进入 **第三步：信念识别**。\n\n我会从你刚才的描述里，看看有没有一些自动冒出来的不合理念头。`,
    s3_analysis: function(text) {
      const t = text||''; let types=[];
      if (/彻底失败|完蛋|没救了|全完了|毫无价值|什么都做不好|完全不行|一无是处/.test(t)) types.push({name:'以偏概全', explain:'用一件事的结果去定义自己的全部价值——因为一次没做好，就觉得自己整个人都不行了。这就像只看了一张照片，就断定整部电影都很糟糕。'});
      if (/必须|一定|应该|绝对要|非得|不能不|非.*不可/.test(t)) types.push({name:'绝对化要求', explain:'在心里给自己定了一个"必须""一定"的硬标准，觉得不达到就不行，没有商量余地。这就像给自己画了一条线，觉得跨不过去就全完了。'});
      if (/毁了一辈子|再也|无法承受|活不下去|天塌了|人生完了|世界末日/.test(t)) types.push({name:'灾难化思维', explain:'把单次的负面结果无限放大，认为后果完全无法承受。就像把一个小石子看成一座山，觉得它能堵死所有的路。'});
      if (!types.length) types=[{name:'以偏概全', explain:'用一件事的结果去定义自己的全部价值——因为一次没做好，就觉得自己整个人都不行了。'}];
      let html = `我分析了一下，你刚才的描述里可能涉及以下不合理信念类型：<br><br>`;
      types.forEach(t => { html += `<div class="belief-card"><span class="tag">🧠 ${t.name}</span><br>${t.explain}</div>`; });
      html += `<br>你能理解上面的解释吗？理解之后告诉我"可以"，我们就进入下一步。`;
      return html;
    },
    s4_intro: `好，那我们进入 **第四步：反思引导**。\n\n我会针对你的情况提几个问题，一次只问一个，你慢慢想，不用着急。`,
    s5: function() {
      return `我们到了 **第五步：重构方案**。\n\n给你两个替代性的积极认知，换个角度看看：\n\n1️⃣ **分数只是人生一个时间点的 snapshot，它定义不了你的成长潜力和独特价值。**\n2️⃣ **从高中到大学，本身就是一次重新开始的契机——你有机会在新环境里做你想成为的自己。**\n\n🌟 **选一个微行动，今天就试试：**\n\n<div class="action-card"><div class="title">✅ 可执行微行动</div><div class="item"><span class="check">✔</span> 拿出纸笔，写下 3 件你近期做到的有成就感的小事</div><div class="item"><span class="check">✔</span> 出门步行 15 分钟，沿途记录 3 个你觉得有意思的细节</div><div class="item"><span class="check">✔</span> 写一段 100 字以内的大学自我介绍草稿</div><div class="item"><span class="check">✔</span> 做 3 组 478 呼吸法：吸气 4 秒、屏息 7 秒、呼气 8 秒</div><div class="item"><span class="check">✔</span> 列出你对大学生活最期待的 3 件具体的事</div></div>\n\n选一个试试，做完可以回来告诉我感受 😊`
    }
  };

  const QUESTIONS = {
    '以偏概全': ['**第一个问题：** 这一次的结果，能代表你所有时候的表现吗？','**第二个问题：** 你有没有过和这件事相反的成功经历？','**第三个问题：** 你会用这一件事去全盘否定你的朋友吗？'],
    '绝对化要求': ['**第一个问题：** 为什么这件事必须达到你预期的标准？','**第二个问题：** 如果没达到这个标准，真的就完全没有价值了吗？','**第三个问题：** 你身边有没有人没做到这件事，但依然发展得很好？'],
    '灾难化思维': ['**第一个问题：** 这件事最坏的结果发生的概率，你觉得有多大？','**第二个问题：** 就算最坏的结果真的出现，你有哪些可以应对的方法？','**第三个问题：** 这件事真的能决定你整个人生的走向吗？']
  };

  function timeStr() { const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
  function scrollDown() { setTimeout(()=>chat.scrollTop=chat.scrollHeight, 60); }
  function updateStepUI(n) {
    stepDots.forEach((dot,i)=>{ const idx=i+1; dot.classList.remove('active','done'); if(idx===n){dot.classList.add('active');dot.querySelector('.circle').textContent=idx;} else if(idx<n){dot.classList.add('done');dot.querySelector('.circle').textContent='✓';} else dot.querySelector('.circle').textContent=idx; });
    input.placeholder = PH[n]||PH[1];
  }
  function addMsg(text, who, isHtml) {
    const div = document.createElement('div'); div.className='msg '+who;
    div.innerHTML='<div class="avatar">'+(who==='bot'?'🌱':'🙂')+'</div><div>'+(isHtml?'<div class="bubble">'+text+'</div>':'<div class="bubble">'+text.replace(/\n/g,'<br>')+'</div>')+'<div class="time">'+timeStr()+'</div></div>';
    chat.appendChild(div); scrollDown();
  }
  function detectBeliefType() { const a=history.map(h=>h.text).join(''); if(/必须|一定|应该|绝对要|非得|不能不/.test(a)) return '绝对化要求'; if(/毁了一辈子|再也|无法承受|活不下去了|天塌了|人生完了/.test(a)) return '灾难化思维'; return '以偏概全'; }

  function botReply(userText) {
    const text=userText||''; let reply='', isHtml=false, nextStep=step;
    if (/自伤|自杀|想死|活不下去|伤害自己|不想活了/.test(text)) { addMsg('⚠️ 如果你正处于严重的情绪危机中，请立即拨打 **12355** 青少年服务热线寻求专业帮助。','bot'); return; }
    if (/结束|退出|停止|不聊了/.test(text)) { addMsg('好的，我们到这里停下来。随时欢迎你回来继续聊 🌱','bot'); return; }
    switch(step) {
      case 1: userFirstEvent=text; history.push({step:1,text}); reply=W.s2; nextStep=2; break;
      case 2: history.push({step:2,text}); reply=W.s3_intro+'<br><br>'+W.s3_analysis(userFirstEvent||text); isHtml=true; break;
      case 3: history.push({step:3,text}); if(/可以|理解|明白|懂了|嗯|好|是的|对的|ok/.test(text)){reply=W.s4_intro+'<br><br>'+QUESTIONS[detectBeliefType()][0];isHtml=true;nextStep=4;subIdx=1;}else{reply=W.s3_analysis(userFirstEvent||text)+'<br><br>如果有不明白的地方可以告诉我，我换个方式解释。';isHtml=true;} break;
      case 4: history.push({step:4,text}); const qs=QUESTIONS[detectBeliefType()]; if(subIdx<qs.length){reply=qs[subIdx];subIdx++;}else{reply=W.s5();isHtml=true;nextStep=5;} break;
      case 5: history.push({step:5,text}); reply='你已经完成了全部 5 步流程 🎉<br><br>如果以后有新的困扰，随时回来重新开始。祝你大学之旅一切顺利！';isHtml=true; break;
    }
    if(reply) addMsg(reply,'bot',isHtml);
    if(nextStep!==step){step=nextStep;updateStepUI(step);}
  }

  function handleSend(){const t=input.value.trim();if(!t)return;addMsg(t,'user');input.value='';input.style.height='auto';setTimeout(()=>botReply(t),350);}
  sendBtn.addEventListener('click',handleSend);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
  input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';});
  addMsg(W.s1,'bot',false);
  updateStepUI(1);
})();
</script>
</body>
